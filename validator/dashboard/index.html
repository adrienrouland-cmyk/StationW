<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StationW Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">StationW</div>
            <nav>
                <a href="#" class="active" id="nav-orders" onclick="switchView('orders')">Orders</a>
                <a href="#" id="nav-clients" onclick="switchView('clients')">Clients</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1 id="page-title">Orders Management</h1>
            </header>

            <div id="view-orders" class="view active">
                <div class="table-container">
                    <table id="orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Details</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="view-clients" class="view">
                <div class="table-container">
                    <table id="clients-table">
                        <thead>
                            <tr>
                                <th>Client ID</th>
                                <th>Company</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Negotiating -->
    <div class="modal-overlay" id="negotiating-modal">
        <div class="modal">
            <h2>Negotiate Proposal</h2>
            <div id="modal-content">
                <!-- Proposal details populated by JS -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="btn-save-proposal" onclick="saveAndSendQuote()">Save & Send Quote</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
